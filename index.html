<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SnapBooth — Wisuda Akbar AL-WILDAN 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#060e20;--navy:#0d1e40;
      --gold:#fbbf24;--gold-dk:#b45309;
      --r-lg:14px;--r-md:10px;--r-sm:7px;
    }
    html,body{height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:#fff;}

    /* ══ SPLASH ══ */
    .splash{
      position:fixed;inset:0;z-index:9999;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
      transition:opacity .5s,visibility .5s;
    }
    .splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
    .splash-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(251,191,36,.1) 0%,transparent 60%);}
    .splash-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:0 32px;width:100%;max-width:300px;}
    .splash-logo{width:72px;height:72px;border-radius:50%;border:2px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 32px rgba(251,191,36,.15);animation:sLogo .6s ease both;}
    .splash-logo img{width:100%;height:100%;object-fit:contain;}
    @keyframes sLogo{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
    .splash-title{text-align:center;animation:sUp .5s .15s ease both;}
    .splash-title h1{font-size:26px;font-weight:900;color:var(--gold);line-height:1.1;}
    .splash-title p{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;margin-top:4px;letter-spacing:.5px;}
    @keyframes sUp{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
    .splash-bar-wrap{width:100%;background:rgba(255,255,255,.07);border-radius:999px;height:4px;overflow:hidden;animation:sUp .5s .25s ease both;}
    .splash-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dk),var(--gold));border-radius:999px;transition:width .3s ease;}
    .splash-status{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;min-height:16px;animation:sUp .5s .3s ease both;}

    /* ══ FULLSCREEN CAMERA WRAPPER ══ */
    /* Video mengisi SELURUH layar — seperti funcam.id */
    .cam-fs{
      position:fixed;inset:0;z-index:1;
      background:#000;
    }
    #video{
      position:absolute;inset:0;
      width:100%;height:100%;
      object-fit:cover;
      transform:scaleX(-1); /* mirror kamera depan */
    }
    #video.env{transform:scaleX(1);}

    /* Frame overlay fullscreen di atas video */
    .frame-fs{
      position:absolute;inset:0;z-index:3;
      background-size:100% 100%;
      background-repeat:no-repeat;
      pointer-events:none;
    }

    /* Guide overlay — kotak crop area yang akan di-capture */
    /* Hanya muncul saat tidak ada frame */
    .crop-guide{
      position:absolute;z-index:4;pointer-events:none;
      border:2px solid rgba(255,255,255,.5);
      box-shadow:0 0 0 9999px rgba(0,0,0,.45);
      border-radius:4px;
      transition:all .3s;
    }
    .crop-guide.hide{opacity:0;}

    /* Corner accents di crop guide */
    .crop-guide::before,.crop-guide::after{
      content:'';position:absolute;
      width:16px;height:16px;
      border-color:var(--gold);border-style:solid;
    }
    .crop-guide::before{top:-2px;left:-2px;border-width:3px 0 0 3px;border-radius:3px 0 0 3px;}
    .crop-guide::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;border-radius:0 0 3px 0;}

    /* ══ STRIP SLOTS GUIDE ══ */
    /* 3 kotak guide untuk mode strip, di atas video */
    .strip-guides{
      position:absolute;inset:0;z-index:4;pointer-events:none;
      display:none;
    }
    .strip-guides.on{display:block;}
    .slot-guide{
      position:absolute;
      border:1.5px solid rgba(255,255,255,.35);
      border-radius:3px;
      display:flex;align-items:center;justify-content:center;
    }
    .slot-guide-num{
      font-size:18px;font-weight:900;
      color:rgba(255,255,255,.25);
    }
    .slot-guide.active{border-color:var(--gold);border-width:2px;box-shadow:0 0 0 1px rgba(251,191,36,.3);}
    .slot-guide.done{border-color:rgba(251,191,36,.5);}
    .slot-guide img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.8;}

    /* ══ COUNTDOWN ══ */
    .cdown{
      position:absolute;inset:0;z-index:15;
      display:none;flex-direction:column;align-items:center;justify-content:center;
      background:rgba(0,0,0,.35);backdrop-filter:blur(2px);
    }
    .cdown.on{display:flex;}
    .cdown-n{
      font-size:96px;font-weight:900;color:var(--gold);line-height:1;
      text-shadow:0 0 48px rgba(251,191,36,.6),0 0 96px rgba(251,191,36,.3);
      animation:cpop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes cpop{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}
    .cdown-lbl{font-size:13px;color:rgba(255,255,255,.6);font-weight:700;margin-top:8px;letter-spacing:.5px;}
    .flash{position:absolute;inset:0;z-index:20;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s;}

    /* ══ TOP BAR (float di atas kamera) ══ */
    .top-bar{
      position:absolute;top:0;left:0;right:0;z-index:10;
      display:flex;align-items:center;justify-content:space-between;
      padding:max(env(safe-area-inset-top),12px) 14px 10px;
      background:linear-gradient(to bottom,rgba(0,0,0,.65) 0%,transparent 100%);
    }
    .top-brand{display:flex;align-items:center;gap:8px;}
    .top-logo{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);display:flex;align-items:center;justify-content:center;font-size:13px;}
    .top-logo img{width:100%;height:100%;object-fit:contain;}
    .top-name{font-size:11px;font-weight:800;color:var(--gold);}
    .top-sub{font-size:8.5px;color:rgba(255,255,255,.4);font-weight:500;}
    .top-frame-btn{
      display:flex;align-items:center;gap:5px;
      background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);
      backdrop-filter:blur(8px);
      border-radius:999px;padding:5px 10px;cursor:pointer;transition:all .2s;
    }
    .top-frame-btn:hover{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.12);}
    .top-frame-ic{font-size:12px;}
    .top-frame-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* ══ MODE TABS (float di bawah top bar) ══ */
    .mode-tabs{
      position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:10;
      display:flex;gap:6px;
      background:rgba(0,0,0,.45);backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;padding:4px;
    }
    .mode-tab{
      padding:6px 14px;border-radius:999px;border:none;
      background:transparent;color:rgba(255,255,255,.45);
      font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;
      white-space:nowrap;
    }
    .mode-tab.active{background:rgba(251,191,36,.18);color:var(--gold);border:1px solid rgba(251,191,36,.35);}

    /* ══ BOTTOM CONTROLS (float di atas kamera) ══ */
    .bot-bar{
      position:absolute;bottom:0;left:0;right:0;z-index:10;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 28px max(env(safe-area-inset-bottom),18px);
      background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
      gap:16px;
    }
    .side-btns{display:flex;gap:10px;align-items:center;}
    .icbtn{
      width:46px;height:46px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,.25);
      background:rgba(0,0,0,.4);backdrop-filter:blur(8px);
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      color:rgba(255,255,255,.8);transition:all .2s;outline:none;
      -webkit-tap-highlight-color:transparent;
    }
    .icbtn:active{transform:scale(.88);}
    .icbtn.on{border-color:var(--gold);background:rgba(251,191,36,.2);color:var(--gold);}
    .icbtn svg{width:20px;height:20px;}
    .shutter{
      width:72px;height:72px;border-radius:50%;flex-shrink:0;
      border:4px solid rgba(255,255,255,.9);
      background:transparent;cursor:pointer;
      position:relative;display:flex;align-items:center;justify-content:center;
      transition:transform .15s;outline:none;
    }
    .shutter::after{
      content:'';width:56px;height:56px;border-radius:50%;
      background:#fff;transition:transform .15s, background .15s;
    }
    .shutter:active{transform:scale(.9);}
    .shutter:active::after{transform:scale(.88);background:#e2e8f0;}
    .shutter:disabled{opacity:.35;cursor:not-allowed;}

    /* ══ FRAME SHEET ══ */
    .sheet-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;}
    .sheet-bg.on{opacity:1;pointer-events:all;}
    .sheet{
      position:fixed;bottom:0;left:0;right:0;z-index:501;
      background:#0d1e40;border-radius:20px 20px 0 0;
      border-top:1px solid rgba(251,191,36,.15);
      padding:0 0 32px;
      transform:translateY(100%);
      transition:transform .35s cubic-bezier(.34,1.1,.64,1);
      max-height:65vh;overflow:hidden;display:flex;flex-direction:column;
    }
    .sheet.on{transform:none;}
    .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;margin:12px auto 14px;}
    .sheet-title{font-size:13px;font-weight:800;color:var(--gold);padding:0 18px 12px;flex-shrink:0;}
    .sheet-list{overflow-y:auto;flex:1;padding:0 14px 4px;display:flex;flex-direction:column;gap:6px;}
    .sheet-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;}
    .sheet-item:hover{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);}
    .sheet-item.selected{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.35);}
    .sheet-item-thumb{width:40px;border-radius:5px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.1);background:#000;}
    .sheet-item-thumb img{width:100%;display:block;}
    .sheet-item-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);flex:1;}
    .sheet-check{font-size:14px;opacity:0;transition:opacity .2s;}
    .sheet-item.selected .sheet-check{opacity:1;}
    .sheet-none{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;}
    .sheet-none:hover{background:rgba(255,255,255,.08);}
    .sheet-none.selected{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);}
    .sheet-none-ic{width:40px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.35;}
    .sheet-none-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.45);flex:1;}

    /* ══ RESULT OVERLAY ══ */
    .result-ov{
      position:fixed;inset:0;z-index:100;
      background:rgba(0,0,0,.9);backdrop-filter:blur(20px);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:16px;gap:14px;
      opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .result-ov.on{opacity:1;pointer-events:all;}
    .result-wrap{
      position:relative;border-radius:var(--r-lg);overflow:hidden;
      box-shadow:0 0 0 1.5px rgba(251,191,36,.25),0 28px 60px rgba(0,0,0,.6);
      transform:scale(.88) translateY(16px);
      transition:transform .4s cubic-bezier(.34,1.2,.64,1);
    }
    .result-ov.on .result-wrap{transform:none;}
    #res-canvas{display:block;max-height:65vh;max-width:88vw;width:auto;height:auto;}
    .result-btns{display:flex;gap:8px;width:100%;max-width:320px;}
    .btn-save{
      flex:1;padding:13px;border:none;border-radius:var(--r-lg);
      background:linear-gradient(135deg,var(--gold-dk),var(--gold));
      font-family:inherit;font-size:13px;font-weight:800;color:var(--navy);
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
      transition:transform .15s;outline:none;
    }
    .btn-save:active{transform:scale(.97);}
    .btn-save:disabled{opacity:.5;cursor:wait;}
    .save-spin{width:15px;height:15px;border:2.5px solid rgba(13,30,64,.25);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;display:none;}
    .btn-save.loading .save-spin{display:block;}
    .btn-save.loading .save-ic{display:none;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-redo{padding:13px 18px;border-radius:var(--r-lg);background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);font-family:inherit;font-size:13px;font-weight:700;color:rgba(255,255,255,.7);cursor:pointer;transition:background .2s;outline:none;}
    .btn-redo:active{transform:scale(.97);}

    /* ══ DL PROGRESS ══ */
    .dl-prog{position:fixed;inset:0;z-index:200;background:rgba(6,14,32,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .3s;}
    .dl-prog.on{opacity:1;pointer-events:all;}
    .dl-ring-wrap{position:relative;width:76px;height:76px;}
    .dl-ring-wrap svg{transform:rotate(-90deg);}
    .dl-ring-wrap circle{fill:none;stroke-width:5;stroke-dasharray:207;stroke-dashoffset:207;stroke-linecap:round;}
    .dl-rbg{stroke:rgba(255,255,255,.08);}
    .dl-rfill{stroke:var(--gold);transition:stroke-dashoffset .25s ease;}
    .dl-ic-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
    .dl-lbl{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);}
    .dl-sub{font-size:10px;color:rgba(255,255,255,.3);}

    /* ══ NO CAM ══ */
    .nocam{position:absolute;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:24px;background:var(--bg);}
    .nocam-ic{font-size:44px;opacity:.3;}
    .nocam h3{font-size:14px;font-weight:700;color:rgba(255,255,255,.5);}
    .nocam p{font-size:12px;color:rgba(255,255,255,.3);line-height:1.6;}

    /* ══ TOAST ══ */
    .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(13,30,64,.97);border:1px solid rgba(251,191,36,.2);border-radius:var(--r-lg);padding:9px 18px;font-size:12px;font-weight:700;white-space:nowrap;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;max-width:90vw;text-align:center;}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

    #cap-canvas{display:none;}
  </style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-glow"></div>
  <div class="splash-inner">
    <div class="splash-logo">
      <img src="logoalwildan.png" alt="AL-WILDAN" onerror="this.style.display='none';this.parentNode.textContent='🎓'">
    </div>
    <div class="splash-title">
      <h1>SnapBooth</h1>
      <p>WISUDA AKBAR AL-WILDAN 2026</p>
    </div>
    <div class="splash-bar-wrap"><div class="splash-bar" id="splash-bar"></div></div>
    <div class="splash-status" id="splash-status">Memuat...</div>
  </div>
</div>

<!-- FULLSCREEN CAMERA -->
<div class="cam-fs" id="cam-fs">

  <!-- Video stream -->
  <video id="video" autoplay playsinline muted></video>

  <!-- Frame PNG overlay fullscreen -->
  <div class="frame-fs" id="frame-fs"></div>

  <!-- Crop guide (tampil saat tanpa frame) -->
  <div class="crop-guide" id="crop-guide"></div>

  <!-- Strip slot guides (mode strip) -->
  <div class="strip-guides" id="strip-guides">
    <div class="slot-guide" id="sg0"><div class="strip-slot-num">1</div></div>
    <div class="slot-guide" id="sg1"><div class="strip-slot-num">2</div></div>
    <div class="slot-guide" id="sg2"><div class="strip-slot-num">3</div></div>
  </div>

  <!-- Countdown -->
  <div class="cdown" id="cdown">
    <div class="cdown-n" id="cdown-n">3</div>
    <div class="cdown-lbl" id="cdown-lbl">Bersiap...</div>
  </div>

  <!-- Flash -->
  <div class="flash" id="flash"></div>

  <!-- No cam -->
  <div class="nocam" id="nocam" style="display:none">
    <div class="nocam-ic">📷</div>
    <h3>Kamera Tidak Tersedia</h3>
    <p>Izinkan akses kamera<br>lalu refresh halaman</p>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-brand">
      <div class="top-logo">
        <img src="logoalwildan.png" alt="" onerror="this.style.display='none';this.parentNode.textContent='🎓'">
      </div>
      <div>
        <div class="top-name">SNAPBOOTH</div>
        <div class="top-sub">WISUDA AKBAR 2026</div>
      </div>
    </div>
    <button class="top-frame-btn" onclick="openSheet()" aria-label="Pilih frame">
      <span class="top-frame-ic">🖼️</span>
      <span class="top-frame-name" id="top-frame-name">Memuat...</span>
    </button>
  </div>

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-single" onclick="setMode('single')">📷 Single</button>
    <button class="mode-tab" id="tab-strip" onclick="setMode('strip')">🎞️ Strip 3×</button>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bot-bar">
    <div class="side-btns">
      <button class="icbtn" id="btn-flip" onclick="flipCam()" aria-label="Ganti kamera">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
      <button class="icbtn" id="btn-torch" onclick="toggleTorch()" aria-label="Flash" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </button>
    </div>

    <button class="shutter" id="shutter" onclick="startCapture()" aria-label="Ambil foto"></button>

    <div class="side-btns">
      <button class="icbtn" onclick="openSheet()" aria-label="Pilih frame">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

</div><!-- /cam-fs -->

<!-- FRAME SHEET -->
<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Pilih Frame</div>
  <div class="sheet-list" id="sheet-list"></div>
</div>

<!-- RESULT -->
<div class="result-ov" id="result-ov">
  <div class="result-wrap"><canvas id="res-canvas"></canvas></div>
  <div class="result-btns">
    <button class="btn-save" id="btn-save" onclick="doDownload()">
      <span class="save-ic">⬇ Simpan Foto</span>
      <div class="dl-spin"></div>
    </button>
    <button class="btn-redo" onclick="retake()">🔄 Ulang</button>
  </div>
</div>

<!-- DL PROGRESS -->
<div class="dl-prog" id="dl-prog">
  <div class="dl-ring-wrap">
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle class="dl-rbg" cx="38" cy="38" r="33"/>
      <circle class="dl-rfill" id="dl-rfill" cx="38" cy="38" r="33"/>
    </svg>
    <div class="dl-ic-center">📸</div>
  </div>
  <div class="dl-lbl" id="dl-lbl">Menyimpan foto...</div>
  <div class="dl-sub">Harap tunggu sebentar</div>
</div>

<div class="toast" id="toast-el"></div>
<canvas id="cap-canvas"></canvas>

<script>
// ══════════════════════════════════
//  CONFIG
// ══════════════════════════════════
const MANIFEST = 'frames/manifest.json';
const FB = 'frames/';
const COUNTDOWN = 3;

// Single output: 1080×1440, area foto dalam frame
const S_FW=1080, S_FH=1440;
const S_AREA={x:97,y:92,w:890,h:1188};

// Strip output: 1080×1920, 3 slot landscape
const T_FW=1080, T_FH=1920;
const SLOTS=[
  {x:86,y:263, w:908,h:411},
  {x:86,y:709, w:908,h:411},
  {x:86,y:1155,w:908,h:411}
];

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let stream=null, facing='user', mode='single';
let frames={single:[],strip:[]};
let selFrame=null;
let capturing=false, stripPhotos=[];
let torchTrack=null, torchOn=false;
let toastTmr=null;
const $=id=>document.getElementById(id);

// ══════════════════════════════════
//  SPLASH
// ══════════════════════════════════
function splashP(pct,msg){ $('splash-bar').style.width=pct+'%'; $('splash-status').textContent=msg; }
function splashHide(){ setTimeout(()=>$('splash').classList.add('hide'),400); }

// ══════════════════════════════════
//  AUDIO
// ══════════════════════════════════
let actx=null;
function initAudio(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); }
function beepShutter(){
  try{
    initAudio(); const t=actx.currentTime;
    const buf=actx.createBuffer(1,actx.sampleRate*.1,actx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){const s=i/actx.sampleRate;d[i]=(Math.random()*2-1)*Math.exp(-s*55)*.7+Math.sin(2*Math.PI*900*s)*Math.exp(-s*35)*.3;}
    const src=actx.createBufferSource(); src.buffer=buf;
    const g=actx.createGain(); g.gain.setValueAtTime(.9,t); g.gain.exponentialRampToValueAtTime(.01,t+.08);
    src.connect(g); g.connect(actx.destination); src.start(t);
  }catch(e){}
}
function beepTick(freq=440){
  try{
    initAudio();
    const o=actx.createOscillator(); o.frequency.value=freq; o.type='sine';
    const g=actx.createGain(); g.gain.setValueAtTime(.15,actx.currentTime); g.gain.exponentialRampToValueAtTime(.01,actx.currentTime+.12);
    o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime+.12);
  }catch(e){}
}

// ══════════════════════════════════
//  CAMERA
// ══════════════════════════════════
async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  torchTrack=null; torchOn=false; $('btn-torch').classList.remove('on');
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},
      audio:false
    });
    $('video').srcObject=stream;
    $('video').className=facing==='environment'?'env':'';
    $('nocam').style.display='none';
    $('shutter').disabled=false;
    // Torch
    const track=stream.getVideoTracks()[0];
    if(facing==='environment'&&track?.getCapabilities?.().torch){
      torchTrack=track; $('btn-torch').style.display='flex';
    } else {
      $('btn-torch').style.display='none';
    }
  }catch(e){
    $('nocam').style.display='flex';
    $('shutter').disabled=true;
    toast('❌ Gagal akses kamera');
  }
}

async function flipCam(){
  facing=facing==='user'?'environment':'user';
  const b=$('btn-flip');
  b.style.transform='rotate(180deg)'; b.style.transition='transform .4s';
  setTimeout(()=>b.style.transform='',400);
  await startCam();
}

async function toggleTorch(){
  if(!torchTrack) return;
  torchOn=!torchOn;
  try{ await torchTrack.applyConstraints({advanced:[{torch:torchOn}]}); }catch(e){torchOn=false;}
  $('btn-torch').classList.toggle('on',torchOn);
}

// ══════════════════════════════════
//  GUIDE POSITIONING
// Hitung posisi & ukuran crop guide di layar
// ══════════════════════════════════
function getScreenCropRect(fw,fh){
  // Video mengisi layar penuh (object-fit:cover)
  // Hitung area video yang terlihat di layar
  const vw=window.innerWidth, vh=window.innerHeight;
  const vid=$('video');
  const nw=vid.videoWidth||1920, nh=vid.videoHeight||1080;

  // Cover scaling
  const scale=Math.max(vw/nw, vh/nh);
  const rw=nw*scale, rh=nh*scale;
  const ox=(vw-rw)/2, oy=(vh-rh)/2; // offset

  // Rasio crop target vs full frame
  const scaleX=rw/fw, scaleY=rh/fh;
  // Offset karena cover crop di sisi
  const cropX=fw*(facing==='user'?1:0); // untuk mirror

  // Area crop dalam koordinat layar
  // Karena video fullscreen dengan cover, titik tengah video = tengah layar
  // Area foto (S_AREA/SLOTS) relatif terhadap canvas output (fw x fh)

  const cx=ox + (fw/2 - fw/2)*scaleX + (fw-fw)*scaleX/2;

  // Pendekatan lebih simple: proporsi area terhadap output
  const px=fw/2, py=fh/2; // pusat output

  return null; // akan dihitung di updateGuide
}

function updateGuide(){
  const vw=window.innerWidth, vh=window.innerHeight;

  if(mode==='single'){
    $('strip-guides').classList.remove('on');
    const guide=$('crop-guide');

    if(selFrame){
      // Saat ada frame: frame mengisi layar penuh, area foto sudah jelas dari frame itu sendiri
      guide.classList.add('hide');
      return;
    }
    guide.classList.remove('hide');

    // Hitung posisi area crop di layar
    // Video cover: skala dan posisi area foto (S_AREA dalam canvas 1080x1440)
    const vid=$('video');
    const nw=vid.videoWidth||1280, nh=vid.videoHeight||720;

    // Canvas output 1080x1440 (3:4)
    // Layar bisa berbeda rasio
    // Kita tampilkan guide proporsional dengan layar
    // Rasio area foto = 890:1188 ≈ 3:4
    const aR=S_AREA.w/S_AREA.h; // ≈0.749
    let gw, gh;
    // Guide mengisi sebagian besar layar vertikal
    gh=vh*0.82; gw=gh*aR;
    if(gw>vw*0.9){gw=vw*0.9; gh=gw/aR;}
    const gl=(vw-gw)/2, gt=(vh-gh)/2;

    guide.style.left=gl+'px'; guide.style.top=gt+'px';
    guide.style.width=gw+'px'; guide.style.height=gh+'px';

  } else {
    // Strip mode: 3 slot guides
    $('crop-guide').classList.add('hide');
    $('strip-guides').classList.on;
    $('strip-guides').classList.add('on');

    // Slot rasio: 908:411 ≈ 2.21:1 (landscape)
    const slotR=908/411;
    // Tampilkan 3 slot secara vertikal di tengah layar
    const PAD=12, GAP=8;
    let sw=vw-PAD*2; let sh=sw/slotR;
    const totalH=sh*3+GAP*2;
    if(totalH>vh*0.88){
      const maxH=(vh*0.88-GAP*2)/3;
      sh=maxH; sw=sh*slotR;
    }
    const sx=(vw-sw)/2;
    const sy=(vh-totalH)/2;

    [0,1,2].forEach(i=>{
      const sg=$('sg'+i);
      sg.style.left=sx+'px';
      sg.style.top=(sy+i*(sh+GAP))+'px';
      sg.style.width=sw+'px';
      sg.style.height=sh+'px';
    });
  }
}

// ══════════════════════════════════
//  MODE
// ══════════════════════════════════
function setMode(m){
  mode=m;
  $('tab-single').classList.toggle('active',m==='single');
  $('tab-strip').classList.toggle('active',m==='strip');
  stripPhotos=[]; resetSlotGuides();
  buildSheet();
  autoSelectFirstFrame();
  updateGuide();
  startCam();
}

// ══════════════════════════════════
//  FRAMES
// ══════════════════════════════════
async function loadFrames(){
  splashP(30,'Memuat frame...');
  try{
    const r=await fetch(MANIFEST);
    if(!r.ok) throw 0;
    const raw=await r.json();
    frames.single=(raw.single||[]).map(f=>typeof f==='string'?{file:f}:f);
    frames.strip=(raw.strip||[]).map(f=>typeof f==='string'?{file:f}:f);
  }catch(e){ frames={single:[],strip:[]}; }
  splashP(60,'Preload assets...');
  await preloadFrameImages();
  splashP(90,'Hampir selesai...');
}

async function preloadFrameImages(){
  const all=[
    ...(frames.single||[]).map(f=>({f,m:'single'})),
    ...(frames.strip||[]).map(f=>({f,m:'strip'}))
  ];
  await Promise.allSettled(all.map(({f,m})=>new Promise(res=>{
    const img=new Image(); img.onload=res; img.onerror=res;
    img.src=`${FB}${m}/${f.file}`;
  })));
}

function autoSelectFirstFrame(){
  const list=frames[mode]||[];
  selFrame=list.length>0?list[0]:null;
  applyFrameUI();
}

function applyFrameUI(){
  if(!selFrame){
    $('top-frame-name').textContent='Tanpa Frame';
    $('frame-fs').style.backgroundImage='';
    $('frame-fs').style.display='none';
    updateGuide();
    return;
  }
  const url=`${FB}${mode}/${selFrame.file}`;
  $('top-frame-name').textContent=selFrame.file.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
  $('frame-fs').style.backgroundImage=`url('${url}')`;
  $('frame-fs').style.display='block';
  updateGuide(); // sembunyikan guide saat ada frame
}

// ══════════════════════════════════
//  FRAME SHEET
// ══════════════════════════════════
function buildSheet(){
  const list=frames[mode]||[];
  $('sheet-title').textContent=`Pilih Frame — ${mode==='single'?'Single Portrait':'Strip 3×'}`;
  const sl=$('sheet-list'); sl.innerHTML='';
  // None
  const none=document.createElement('div');
  none.className='sheet-none'+(selFrame===null?' selected':'');
  none.innerHTML=`<div class="sheet-none-ic">⊘</div><div class="sheet-none-name">Tanpa Frame</div><span class="sheet-check">✓</span>`;
  none.onclick=()=>pickFrame(null); sl.appendChild(none);
  // Items
  list.forEach(f=>{
    const name=f.file.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    const div=document.createElement('div');
    div.className='sheet-item'+(selFrame&&selFrame.file===f.file?' selected':'');
    div.innerHTML=`<div class="sheet-item-thumb"><img src="${FB}${mode}/${f.file}" loading="lazy"></div><span class="sheet-item-name">${name}</span><span class="sheet-check">✓</span>`;
    div.onclick=()=>pickFrame(f); sl.appendChild(div);
  });
}

function pickFrame(f){ selFrame=f; applyFrameUI(); buildSheet(); closeSheet(); }
function openSheet(){ buildSheet(); $('sheet-bg').classList.add('on'); $('sheet').classList.add('on'); }
function closeSheet(){ $('sheet-bg').classList.remove('on'); $('sheet').classList.remove('on'); }

// ══════════════════════════════════
//  COUNTDOWN
// ══════════════════════════════════
function runCountdown(label='Bersiap...'){
  return new Promise(res=>{
    $('cdown').classList.add('on');
    $('cdown-lbl').textContent=label;
    let n=COUNTDOWN;
    const tick=()=>{
      $('cdown-n').textContent=n;
      $('cdown-n').style.animation='none';
      void $('cdown-n').offsetHeight;
      $('cdown-n').style.animation='';
      beepTick(n===1?880:440);
      if(n===0){ $('cdown').classList.remove('on'); res(); return; }
      n--; setTimeout(tick,1000);
    };
    tick();
  });
}

// ══════════════════════════════════
//  CAPTURE ONE PHOTO
// Capture area sesuai rasio target dari video fullscreen
// ══════════════════════════════════
async function captureOne(fw,fh){
  const vid=$('video');
  const cap=$('cap-canvas');
  cap.width=fw; cap.height=fh;
  const ctx=cap.getContext('2d');

  // Mirror jika kamera depan
  if(facing==='user'){ ctx.translate(fw,0); ctx.scale(-1,1); }

  // Crop center dari video stream
  const vw=vid.videoWidth, vh=vid.videoHeight;
  const tr=fw/fh;
  let sx,sy,sw,sh;
  if(vw/vh>tr){ sh=vh; sw=vh*tr; sx=(vw-sw)/2; sy=0; }
  else{ sw=vw; sh=vw/tr; sx=0; sy=(vh-sh)/2; }
  ctx.drawImage(vid,sx,sy,sw,sh,0,0,fw,fh);
  ctx.setTransform(1,0,0,1,0,0);

  // Flash
  const fl=$('flash'); fl.style.opacity='.9'; setTimeout(()=>fl.style.opacity='0',130);
  beepShutter();

  const out=document.createElement('canvas');
  out.width=fw; out.height=fh;
  out.getContext('2d').drawImage(cap,0,0);
  return out;
}

// ══════════════════════════════════
//  LOAD IMAGE
// ══════════════════════════════════
function loadImg(src){
  return new Promise(res=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>res(img); img.onerror=()=>res(null);
    img.src=src;
  });
}

// ══════════════════════════════════
//  COMPOSE SINGLE
// Foto di-place di area frame, lalu frame di-overlay
// ══════════════════════════════════
async function composeSingle(photo){
  if(!selFrame) return photo; // no frame: return foto 3:4 langsung
  const canvas=document.createElement('canvas');
  canvas.width=S_FW; canvas.height=S_FH;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(photo, S_AREA.x, S_AREA.y, S_AREA.w, S_AREA.h);
  const fi=await loadImg(`${FB}single/${selFrame.file}`);
  if(fi) ctx.drawImage(fi,0,0,S_FW,S_FH);
  return canvas;
}

// ══════════════════════════════════
//  COMPOSE STRIP
// ══════════════════════════════════
async function composeStrip(photos){
  const canvas=document.createElement('canvas');
  canvas.width=T_FW; canvas.height=T_FH;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#0d1e40'; ctx.fillRect(0,0,T_FW,T_FH);
  photos.forEach((p,i)=>{ const s=SLOTS[i]; ctx.drawImage(p,s.x,s.y,s.w,s.h); });
  if(selFrame){
    const fi=await loadImg(`${FB}strip/${selFrame.file}`);
    if(fi) ctx.drawImage(fi,0,0,T_FW,T_FH);
  }
  return canvas;
}

// ══════════════════════════════════
//  MAIN CAPTURE
// ══════════════════════════════════
async function startCapture(){
  if(capturing) return;
  capturing=true; $('shutter').disabled=true;
  initAudio();

  if(mode==='single'){
    await runCountdown('Bersiap...');
    const photo=await captureOne(S_AREA.w, S_AREA.h);
    const result=await composeSingle(photo);
    showResult(result);

  } else {
    // Strip: 3 foto landscape
    stripPhotos=[];
    for(let i=0;i<3;i++){
      if(i>0) $('sg'+(i-1)).classList.remove('active');
      $('sg'+i).classList.add('active');
      await runCountdown(`Foto ${i+1} dari 3`);
      const p=await captureOne(SLOTS[i].w, SLOTS[i].h);
      stripPhotos.push(p);
      // Fly-in thumbnail ke slot guide
      const sg=$('sg'+i);
      sg.classList.remove('active'); sg.classList.add('done');
      sg.querySelector('.strip-slot-num')?.remove();
      const img=document.createElement('img');
      img.src=p.toDataURL('image/jpeg',.75);
      sg.appendChild(img);
    }
    $('sg2').classList.remove('active'); $('sg2').classList.add('done');
    const result=await composeStrip(stripPhotos);
    showResult(result);
  }
}

// ══════════════════════════════════
//  SHOW RESULT
// ══════════════════════════════════
function showResult(canvas){
  const rc=$('res-canvas');
  rc.width=canvas.width; rc.height=canvas.height;
  rc.getContext('2d').drawImage(canvas,0,0);
  $('result-ov').classList.add('on');
  capturing=false; $('shutter').disabled=false;
}

// ══════════════════════════════════
//  DOWNLOAD
// ══════════════════════════════════
async function doDownload(){
  const rc=$('res-canvas');
  const prog=$('dl-prog'), ring=$('dl-rfill'), lbl=$('dl-lbl');
  const C=207; prog.classList.add('on'); let pct=0; ring.style.strokeDashoffset=C;
  const animTo=(tg,lb,ms=300)=>new Promise(res=>{
    lbl.textContent=lb; const st=pct,t0=performance.now();
    const f=now=>{ const p=Math.min((now-t0)/ms,1); pct=st+(tg-st)*p;
      ring.style.strokeDashoffset=C*(1-pct/100); if(p<1)requestAnimationFrame(f); else res(); };
    requestAnimationFrame(f);
  });
  await animTo(40,'Memproses foto...'); await sleep(200);
  await animTo(80,'Menyiapkan file...');
  const ts=new Date().toISOString().slice(0,19).replace(/[-:T]/g,'');
  rc.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`snapbooth-wisuda-${mode}-${ts}.jpg`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },'image/jpeg',.95);
  await animTo(100,'✅ Tersimpan!',250); await sleep(700);
  prog.classList.remove('on'); pct=0;
  toast('✅ Foto berhasil disimpan!');
}

// ══════════════════════════════════
//  RETAKE
// ══════════════════════════════════
function retake(){
  $('result-ov').classList.remove('on');
  stripPhotos=[]; resetSlotGuides();
  capturing=false; $('shutter').disabled=false;
}

function resetSlotGuides(){
  [0,1,2].forEach(i=>{
    const sg=$('sg'+i);
    sg.className='slot-guide';
    sg.innerHTML=`<div class="strip-slot-num">${i+1}</div>`;
  });
}

// ══════════════════════════════════
//  UTILS
// ══════════════════════════════════
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
function toast(msg,dur=3000){
  const el=$('toast-el'); el.textContent=msg; el.classList.add('on');
  clearTimeout(toastTmr); toastTmr=setTimeout(()=>el.classList.remove('on'),dur);
}
document.addEventListener('keydown',e=>{
  if(e.key===' '&&!capturing){e.preventDefault();startCapture();}
  if(e.key==='Escape'){
    if($('result-ov').classList.contains('on'))retake();
    if($('sheet').classList.contains('on'))closeSheet();
  }
});
window.addEventListener('resize',()=>updateGuide());
screen.orientation?.addEventListener('change',()=>{ setTimeout(()=>{updateGuide();startCam();},350); });
window.addEventListener('orientationchange',()=>{ setTimeout(()=>{updateGuide();startCam();},350); });

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════
async function init(){
  splashP(10,'Memulai...');
  await sleep(200);
  splashP(20,'Mengakses kamera...');
  await loadFrames();
  splashP(70,'Inisialisasi kamera...');
  await startCam();
  splashP(90,'Mempersiapkan UI...');
  await sleep(200);
  autoSelectFirstFrame();
  buildSheet();
  updateGuide();
  splashP(100,'Siap!');
  await sleep(500);
  splashHide();
}
init();
