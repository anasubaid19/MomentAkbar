<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MomenAkbar — Wisuda Akbar AL-WILDAN 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060e20;--navy:#0d1e40;
  --gold:#fbbf24;--gold-dk:#b45309;
  --r-lg:14px;--r-md:10px;--r-sm:7px;
}
html,body{height:100%;overflow:hidden;background:#000;font-family:'Plus Jakarta Sans',sans-serif;color:#fff;}

/* ══ SPLASH ══ */
.splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .5s,visibility .5s;}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(251,191,36,.1) 0%,transparent 60%);}
.splash-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:0 32px;width:100%;max-width:300px;}
.splash-logo{width:72px;height:72px;border-radius:50%;border:2px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 32px rgba(251,191,36,.15);animation:sLogo .6s ease both;}
.splash-logo img{width:100%;height:100%;object-fit:contain;}
@keyframes sLogo{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.splash-title{text-align:center;animation:sUp .5s .15s ease both;}
.splash-title h1{font-size:26px;font-weight:900;color:var(--gold);line-height:1.1;}
.splash-title p{font-size:11px;color:rgba(255,255,255,.4);font-weight:500;margin-top:4px;letter-spacing:.5px;}
@keyframes sUp{from{transform:translateY(14px);opacity:0}to{transform:none;opacity:1}}
.splash-bar-wrap{width:100%;background:rgba(255,255,255,.07);border-radius:999px;height:4px;overflow:hidden;animation:sUp .5s .25s ease both;}
.splash-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--gold-dk),var(--gold));border-radius:999px;transition:width .3s ease;}
.splash-status{font-size:11px;color:rgba(255,255,255,.35);font-weight:600;min-height:16px;animation:sUp .5s .3s ease both;}

/* ══ MAIN WRAP ══ */
.main-wrap{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);}

/* ══ TOP BAR ══ */
.top-bar{position:relative;z-index:30;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:max(env(safe-area-inset-top),12px) 14px 10px;background:linear-gradient(to bottom,rgba(6,14,32,.98) 0%,rgba(6,14,32,.85) 100%);border-bottom:1px solid rgba(251,191,36,.1);}
.top-brand{display:flex;align-items:center;gap:8px;}
.top-logo{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1px solid rgba(251,191,36,.3);background:rgba(251,191,36,.08);display:flex;align-items:center;justify-content:center;font-size:13px;}
.top-logo img{width:100%;height:100%;object-fit:contain;}
.top-name{font-size:11px;font-weight:800;color:var(--gold);}
.top-sub{font-size:8.5px;color:rgba(255,255,255,.4);font-weight:500;}
.top-frame-btn{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:999px;padding:5px 10px;cursor:pointer;transition:all .2s;}
.top-frame-btn:hover{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.12);}
.top-frame-ic{font-size:12px;}
.top-frame-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.75);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ══ UPLOAD ZONE (State A) ══ */
.upload-zone{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
.upload-inner{display:flex;flex-direction:column;align-items:center;gap:12px;border:2px dashed rgba(251,191,36,.25);border-radius:20px;padding:48px 32px;background:rgba(251,191,36,.03);text-align:center;transition:all .2s;width:100%;max-width:360px;cursor:pointer;}
.upload-inner.drag-over{border-color:var(--gold);background:rgba(251,191,36,.08);}
.upload-icon{font-size:52px;line-height:1;}
.upload-title{font-size:16px;font-weight:800;color:#fff;}
.upload-hint{font-size:12px;color:rgba(255,255,255,.4);font-weight:500;}
.btn-pick-photo{margin-top:8px;padding:12px 28px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border:none;border-radius:999px;font-family:inherit;font-size:13px;font-weight:800;color:var(--navy);cursor:pointer;transition:transform .15s;outline:none;}
.btn-pick-photo:active{transform:scale(.97);}

/* ══ CANVAS WRAP (State B) ══ */
.canvas-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000;}
#preview-canvas{display:block;max-width:100%;max-height:100%;object-fit:contain;cursor:grab;touch-action:none;}
#preview-canvas:active{cursor:grabbing;}

/* ══ DIM PANELS ══ */
.dim-panel{position:fixed;z-index:2;pointer-events:none;background:#000;opacity:.6;}

/* ══ BOTTOM BAR ══ */
.bot-bar{position:relative;z-index:30;flex-shrink:0;padding:12px 24px max(env(safe-area-inset-bottom),16px);background:linear-gradient(to top,rgba(6,14,32,.98) 0%,rgba(6,14,32,.85) 100%);border-top:1px solid rgba(255,255,255,.06);}
.bot-state-a{display:flex;justify-content:center;}
.bot-state-b{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.btn-download{flex:1;padding:14px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));border:none;border-radius:var(--r-lg);font-family:inherit;font-size:14px;font-weight:800;color:var(--navy);cursor:pointer;transition:transform .15s;outline:none;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-download:active{transform:scale(.97);}
.btn-download:disabled{opacity:.5;cursor:wait;}
.btn-pick-center{flex:none;padding:14px 36px;border-radius:999px;}
.icbtn{width:46px;height:46px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.25);background:rgba(255,255,255,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.8);transition:all .2s;outline:none;-webkit-tap-highlight-color:transparent;}
.icbtn:active{transform:scale(.88);}
.icbtn svg{width:20px;height:20px;}

/* ══ DL PROGRESS ══ */
.dl-prog{position:fixed;inset:0;z-index:200;background:rgba(6,14,32,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;pointer-events:none;transition:opacity .3s;}
.dl-prog.on{opacity:1;pointer-events:all;}
.dl-ring-wrap{position:relative;width:76px;height:76px;}
.dl-ring-wrap svg{transform:rotate(-90deg);}
.dl-ring-wrap circle{fill:none;stroke-width:5;stroke-dasharray:207;stroke-dashoffset:207;stroke-linecap:round;}
.dl-rbg{stroke:rgba(255,255,255,.08);}
.dl-rfill{stroke:var(--gold);transition:stroke-dashoffset .25s ease;}
.dl-ic-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;}
.dl-lbl{font-size:13px;font-weight:700;color:rgba(255,255,255,.7);}
.dl-sub{font-size:10px;color:rgba(255,255,255,.3);}

/* ══ SHARE MODAL ══ */
.share-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;}
.share-bg.on{opacity:1;pointer-events:all;}
.share-modal{position:fixed;bottom:0;left:0;right:0;z-index:501;background:var(--navy);border-radius:20px 20px 0 0;border-top:1px solid rgba(251,191,36,.2);padding:0 20px max(env(safe-area-inset-bottom),28px);transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1);}
.share-modal.on{transform:none;}
.share-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;margin:12px auto 16px;}
.share-title{font-size:16px;font-weight:800;color:var(--gold);text-align:center;margin-bottom:20px;}
.share-btns{display:flex;flex-direction:column;gap:10px;}
.share-btn{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:var(--r-lg);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:transform .15s;outline:none;}
.share-btn:active{transform:scale(.97);}
.share-ig{background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);color:#fff;}
.share-tt{background:#000;border:1px solid rgba(255,255,255,.15);color:#fff;}
.share-copy{background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.3);color:var(--gold);}
.share-dismiss{width:100%;margin-top:12px;padding:12px;border:none;background:transparent;font-family:inherit;font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;border-radius:var(--r-md);transition:background .2s;}
.share-dismiss:hover{background:rgba(255,255,255,.05);}

/* ══ FRAME SHEET ══ */
.sheet-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s;}
.sheet-bg.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:501;background:#0d1e40;border-radius:20px 20px 0 0;border-top:1px solid rgba(251,191,36,.15);padding:0 0 32px;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.1,.64,1);max-height:65vh;overflow:hidden;display:flex;flex-direction:column;}
.sheet.on{transform:none;}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:999px;margin:12px auto 14px;}
.sheet-title{font-size:13px;font-weight:800;color:var(--gold);padding:0 18px 12px;flex-shrink:0;}
.sheet-list{overflow-y:auto;flex:1;padding:0 14px 4px;display:flex;flex-direction:column;gap:6px;}
.sheet-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;}
.sheet-item:hover{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);}
.sheet-item.selected{background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.35);}
.sheet-item-thumb{width:40px;border-radius:5px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.1);background:#000;}
.sheet-item-thumb img{width:100%;display:block;}
.sheet-item-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);flex:1;}
.sheet-check{font-size:14px;opacity:0;transition:opacity .2s;}
.sheet-item.selected .sheet-check{opacity:1;}
.sheet-none{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--r-md);background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s;}
.sheet-none.selected{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.2);}
.sheet-none-ic{width:40px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;opacity:.35;}
.sheet-none-name{font-size:12px;font-weight:700;color:rgba(255,255,255,.45);flex:1;}

/* ══ TOAST ══ */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(13,30,64,.97);border:1px solid rgba(251,191,36,.2);border-radius:var(--r-lg);padding:9px 18px;font-size:12px;font-weight:700;white-space:nowrap;z-index:9999;opacity:0;pointer-events:none;transition:all .22s;max-width:90vw;text-align:center;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-glow"></div>
  <div class="splash-inner">
    <div class="splash-logo">
      <img src="logoalwildan.png" alt="AL-WILDAN" onerror="this.style.display='none';this.parentNode.textContent='🎓'">
    </div>
    <div class="splash-title">
      <h1>MomenAkbar</h1>
      <p>WISUDA AKBAR AL-WILDAN 2026</p>
    </div>
    <div class="splash-bar-wrap"><div class="splash-bar" id="splash-bar"></div></div>
    <div class="splash-status" id="splash-status">Memuat frame...</div>
  </div>
</div>

<!-- MAIN WRAPPER -->
<div class="main-wrap" id="main-wrap">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-brand">
      <div class="top-logo">
        <img src="logoalwildan.png" alt="" onerror="this.style.display='none';this.parentNode.textContent='🎓'">
      </div>
      <div>
        <div class="top-name">MOMENAKBAR</div>
        <div class="top-sub">WISUDA AKBAR 2026</div>
      </div>
    </div>
    <button class="top-frame-btn" onclick="openSheet()" aria-label="Pilih frame">
      <span class="top-frame-ic">🖼️</span>
      <span class="top-frame-name" id="top-frame-name">Memuat...</span>
    </button>
  </div>

  <!-- STATE A: Upload Zone -->
  <div class="upload-zone" id="upload-zone">
    <div class="upload-inner" id="upload-drop-area">
      <div class="upload-icon">📷</div>
      <div class="upload-title">Pilih foto dari galeri</div>
      <div class="upload-hint">atau drag & drop foto ke sini</div>
      <button class="btn-pick-photo" onclick="triggerFileInput()">Pilih Foto</button>
    </div>
  </div>

  <!-- STATE B: Canvas Preview -->
  <div class="canvas-wrap" id="canvas-wrap" style="display:none">
    <div class="dim-panel" id="dim-top"></div>
    <div class="dim-panel" id="dim-bottom"></div>
    <div class="dim-panel" id="dim-left"></div>
    <div class="dim-panel" id="dim-right"></div>
    <canvas id="preview-canvas"></canvas>
  </div>

  <!-- BOTTOM BAR -->
  <div class="bot-bar">
    <div class="bot-state-a" id="bot-state-a">
      <button class="btn-download btn-pick-center" onclick="triggerFileInput()">📷 Pilih Foto</button>
    </div>
    <div class="bot-state-b" id="bot-state-b" style="display:none">
      <button class="icbtn" onclick="triggerFileInput()" aria-label="Ganti foto" title="Ganti Foto">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <button class="btn-download" id="btn-download" onclick="doDownload()">⬇ Download</button>
      <button class="icbtn" onclick="openSheet()" aria-label="Pilih frame">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
      </button>
    </div>
  </div>

</div><!-- /main-wrap -->

<!-- HIDDEN FILE INPUT -->
<input type="file" id="file-input" accept="image/*" style="display:none">

<!-- FRAME SHEET -->
<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Pilih Frame</div>
  <div class="sheet-list" id="sheet-list"></div>
</div>

<!-- DL PROGRESS -->
<div class="dl-prog" id="dl-prog">
  <div class="dl-ring-wrap">
    <svg width="76" height="76" viewBox="0 0 76 76">
      <circle class="dl-rbg" cx="38" cy="38" r="33"/>
      <circle class="dl-rfill" id="dl-rfill" cx="38" cy="38" r="33"/>
    </svg>
    <div class="dl-ic-center">📸</div>
  </div>
  <div class="dl-lbl" id="dl-lbl">Menyimpan foto...</div>
  <div class="dl-sub">Harap tunggu sebentar</div>
</div>

<!-- SHARE MODAL -->
<div class="share-bg" id="share-bg" onclick="closeShare()"></div>
<div class="share-modal" id="share-modal">
  <div class="share-handle"></div>
  <div class="share-title">Bagikan Momenmu! 🎓</div>
  <div class="share-btns">
    <button class="share-btn share-ig" onclick="window.open('https://www.instagram.com/stories/create','_blank')">
      <span>📸</span> Instagram Story
    </button>
    <button class="share-btn share-tt" onclick="window.open('https://www.tiktok.com/upload','_blank')">
      <span>🎵</span> TikTok
    </button>
    <button class="share-btn share-copy" onclick="copyCaption()">
      <span>📋</span> Salin Caption
    </button>
  </div>
  <button class="share-dismiss" onclick="closeShare()">Nanti saja</button>
</div>

<div class="toast" id="toast-el"></div>

<script>
// ══════════════════════════════════
//  CONFIG
// ══════════════════════════════════
const MANIFEST = 'frames/manifest.json';
const FB = 'frames/';
const CAPTION = '#WisudaAkbar2026 #ALWILDANIslamicSchool #WisudaAkbar #BestMemories';
const DEFAULT_W = 1080, DEFAULT_H = 1440;

// ══════════════════════════════════
//  STATE
// ══════════════════════════════════
let frames = [];
let selFrame = null;
let frameImg = null;
let photoImg = null;
let zoom = 1;
let panX = 0, panY = 0;
let isDragging = false;
let lastX = 0, lastY = 0;
let pinchDist = 0;
let toastTmr = null;
let hasPhoto = false;

const $ = id => document.getElementById(id);

// ══════════════════════════════════
//  AUDIO
// ══════════════════════════════════
let actx = null;
function initAudio() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); }
function beepShutter() {
  try {
    initAudio(); const t = actx.currentTime;
    const buf = actx.createBuffer(1, actx.sampleRate * .1, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) { const s = i / actx.sampleRate; d[i] = (Math.random() * 2 - 1) * Math.exp(-s * 55) * .7 + Math.sin(2 * Math.PI * 900 * s) * Math.exp(-s * 35) * .3; }
    const src = actx.createBufferSource(); src.buffer = buf;
    const g = actx.createGain(); g.gain.setValueAtTime(.9, t); g.gain.exponentialRampToValueAtTime(.01, t + .08);
    src.connect(g); g.connect(actx.destination); src.start(t);
  } catch (e) {}
}

// ══════════════════════════════════
//  UTILS
// ══════════════════════════════════
const sleep = ms => new Promise(r => setTimeout(r, ms));
function toast(msg, dur = 3000) {
  const el = $('toast-el'); el.textContent = msg; el.classList.add('on');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => el.classList.remove('on'), dur);
}
function loadImg(src) {
  return new Promise(res => {
    const img = new Image(); img.crossOrigin = 'anonymous';
    img.onload = () => res(img); img.onerror = () => res(null);
    img.src = src;
  });
}

// ══════════════════════════════════
//  SPLASH
// ══════════════════════════════════
function splashP(pct, msg) { $('splash-bar').style.width = pct + '%'; $('splash-status').textContent = msg; }
function splashHide() { setTimeout(() => $('splash').classList.add('hide'), 400); }

// ══════════════════════════════════
//  FRAME SYSTEM
// ══════════════════════════════════
async function loadFrames() {
  splashP(30, 'Memuat frame...');
  try {
    const r = await fetch(MANIFEST);
    if (!r.ok) throw 0;
    const raw = await r.json();
    frames = (raw.frames || []).map(f =>
      typeof f === 'string'
        ? { file: f, name: f.replace(/\.[^.]+$/, ''), w: DEFAULT_W, h: DEFAULT_H, photoArea: { x: 0, y: 0, w: DEFAULT_W, h: DEFAULT_H } }
        : f
    );
  } catch (e) { frames = []; }
  splashP(60, 'Preload aset...');
  await Promise.allSettled(frames.map(f => loadImg(`${FB}${f.file}`)));
  splashP(90, 'Hampir selesai...');
}

function autoSelectFirstFrame() {
  selFrame = frames.length > 0 ? frames[0] : null;
  updateFrameUI();
}

function updateFrameUI() {
  $('top-frame-name').textContent = selFrame
    ? (selFrame.name || selFrame.file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '))
    : 'Tanpa Frame';
}

// ══════════════════════════════════
//  FRAME SHEET
// ══════════════════════════════════
function buildSheet() {
  $('sheet-title').textContent = 'Pilih Frame';
  const sl = $('sheet-list'); sl.innerHTML = '';
  const none = document.createElement('div');
  none.className = 'sheet-none' + (selFrame === null ? ' selected' : '');
  none.innerHTML = `<div class="sheet-none-ic">⊘</div><div class="sheet-none-name">Tanpa Frame</div><span class="sheet-check">✓</span>`;
  none.onclick = () => pickFrame(null);
  sl.appendChild(none);
  frames.forEach(f => {
    const name = f.name || f.file.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    const div = document.createElement('div');
    div.className = 'sheet-item' + (selFrame && selFrame.file === f.file ? ' selected' : '');
    div.innerHTML = `<div class="sheet-item-thumb"><img src="${FB}${f.file}" loading="lazy"></div><span class="sheet-item-name">${name}</span><span class="sheet-check">✓</span>`;
    div.onclick = () => pickFrame(f);
    sl.appendChild(div);
  });
}

async function pickFrame(f) {
  selFrame = f;
  frameImg = f ? await loadImg(`${FB}${f.file}`) : null;
  updateFrameUI(); buildSheet(); closeSheet();
  if (hasPhoto) { resizeCanvas(); fitPhotoToArea(); renderPreview(); updateDimPanels(); }
}

function openSheet() { buildSheet(); $('sheet-bg').classList.add('on'); $('sheet').classList.add('on'); }
function closeSheet() { $('sheet-bg').classList.remove('on'); $('sheet').classList.remove('on'); }

// ══════════════════════════════════
//  UPLOAD
// ══════════════════════════════════
function triggerFileInput() { initAudio(); $('file-input').click(); }

$('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handleFile(file);
  e.target.value = '';
});

const dropArea = $('upload-drop-area');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => {
  e.preventDefault(); dropArea.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile(file) {
  if (!file.type.startsWith('image/')) { toast('❌ File harus berupa gambar'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    photoImg = resizeIfNeeded(img, 1920);
    hasPhoto = true;
    switchToStateB();
    resizeCanvas();
    fitPhotoToArea();
    renderPreview();
    requestAnimationFrame(() => updateDimPanels());
  };
  img.onerror = () => { URL.revokeObjectURL(url); toast('❌ Gagal memuat foto'); };
  img.src = url;
}

function resizeIfNeeded(img, maxPx) {
  const long = Math.max(img.width, img.height);
  if (long <= maxPx) return img;
  const scale = maxPx / long;
  const c = document.createElement('canvas');
  c.width = Math.round(img.width * scale);
  c.height = Math.round(img.height * scale);
  c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
  return c;
}

function switchToStateA() {
  $('upload-zone').style.display = '';
  $('canvas-wrap').style.display = 'none';
  $('bot-state-a').style.display = 'flex';
  $('bot-state-b').style.display = 'none';
  hasPhoto = false; photoImg = null;
}

function switchToStateB() {
  $('upload-zone').style.display = 'none';
  $('canvas-wrap').style.display = 'flex';
  $('bot-state-a').style.display = 'none';
  $('bot-state-b').style.display = 'flex';
}

// ══════════════════════════════════
//  CANVAS & RENDER
// ══════════════════════════════════
function getCanvasDims() {
  return selFrame ? { w: selFrame.w, h: selFrame.h } : { w: DEFAULT_W, h: DEFAULT_H };
}

function getPhotoArea() {
  return selFrame?.photoArea ?? { x: 0, y: 0, w: DEFAULT_W, h: DEFAULT_H };
}

function resizeCanvas() {
  const canvas = $('preview-canvas');
  const d = getCanvasDims();
  canvas.width = d.w;
  canvas.height = d.h;
}

function fitPhotoToArea() {
  if (!photoImg) return;
  const pa = getPhotoArea();
  zoom = Math.max(pa.w / photoImg.width, pa.h / photoImg.height);
  panX = 0; panY = 0;
}

function clampPan() {
  if (!photoImg) return;
  const pa = getPhotoArea();
  const maxPx = Math.max(0, (photoImg.width * zoom - pa.w) / 2);
  const maxPy = Math.max(0, (photoImg.height * zoom - pa.h) / 2);
  panX = Math.max(-maxPx, Math.min(maxPx, panX));
  panY = Math.max(-maxPy, Math.min(maxPy, panY));
}

function renderPreview() {
  const canvas = $('preview-canvas');
  const ctx = canvas.getContext('2d');
  const d = getCanvasDims();
  const pa = getPhotoArea();

  ctx.clearRect(0, 0, d.w, d.h);
  ctx.fillStyle = '#060e20';
  ctx.fillRect(0, 0, d.w, d.h);

  if (photoImg) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(pa.x, pa.y, pa.w, pa.h);
    ctx.clip();
    ctx.translate(pa.x + pa.w / 2 + panX, pa.y + pa.h / 2 + panY);
    ctx.scale(zoom, zoom);
    ctx.drawImage(photoImg, -photoImg.width / 2, -photoImg.height / 2);
    ctx.restore();
  }

  if (frameImg) ctx.drawImage(frameImg, 0, 0, d.w, d.h);
}

// ══════════════════════════════════
//  DIM PANELS
// ══════════════════════════════════
function updateDimPanels() {
  if (!hasPhoto) return;
  const canvas = $('preview-canvas');
  const rect = canvas.getBoundingClientRect();
  const pa = getPhotoArea();
  const d = getCanvasDims();
  const sx = rect.width / d.w;
  const sy = rect.height / d.h;
  const left   = rect.left   + pa.x * sx;
  const top    = rect.top    + pa.y * sy;
  const right  = rect.left   + (pa.x + pa.w) * sx;
  const bottom = rect.top    + (pa.y + pa.h) * sy;
  $('dim-top').style.cssText    = `top:0;left:0;right:0;height:${top}px;`;
  $('dim-bottom').style.cssText = `bottom:0;left:0;right:0;height:${window.innerHeight - bottom}px;`;
  $('dim-left').style.cssText   = `top:${top}px;left:0;width:${left}px;height:${bottom - top}px;`;
  $('dim-right').style.cssText  = `top:${top}px;right:0;width:${window.innerWidth - right}px;height:${bottom - top}px;`;
}

// ══════════════════════════════════
//  PAN & ZOOM
// ══════════════════════════════════
function screenToCanvas(dScreen) {
  const canvas = $('preview-canvas');
  const rect = canvas.getBoundingClientRect();
  return dScreen * (getCanvasDims().w / rect.width);
}

const previewCanvas = $('preview-canvas');

previewCanvas.addEventListener('mousedown', e => {
  if (!hasPhoto) return;
  isDragging = true; lastX = e.clientX; lastY = e.clientY;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  panX += screenToCanvas(e.clientX - lastX);
  panY += screenToCanvas(e.clientY - lastY);
  lastX = e.clientX; lastY = e.clientY;
  clampPan(); renderPreview();
});
window.addEventListener('mouseup', () => { isDragging = false; });

previewCanvas.addEventListener('wheel', e => {
  if (!hasPhoto) return;
  e.preventDefault();
  zoom = Math.max(0.5, Math.min(5, zoom + (e.deltaY > 0 ? -0.1 : 0.1)));
  clampPan(); renderPreview();
}, { passive: false });

previewCanvas.addEventListener('touchstart', e => {
  if (!hasPhoto) return;
  e.preventDefault();
  if (e.touches.length === 1) {
    isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: false });

previewCanvas.addEventListener('touchmove', e => {
  if (!hasPhoto) return;
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    panX += screenToCanvas(e.touches[0].clientX - lastX);
    panY += screenToCanvas(e.touches[0].clientY - lastY);
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    clampPan(); renderPreview();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    if (pinchDist > 0) { zoom = Math.max(0.5, Math.min(5, zoom * (dist / pinchDist))); clampPan(); renderPreview(); }
    pinchDist = dist;
  }
}, { passive: false });

previewCanvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchDist = 0;
  if (e.touches.length === 0) isDragging = false;
});

// ══════════════════════════════════
//  DOWNLOAD
// ══════════════════════════════════
async function doDownload() {
  if (!hasPhoto) return;
  initAudio();
  const prog = $('dl-prog'), ring = $('dl-rfill'), lbl = $('dl-lbl');
  const C = 207; prog.classList.add('on'); let pct = 0; ring.style.strokeDashoffset = C;
  const animTo = (tg, lb, ms = 300) => new Promise(res => {
    lbl.textContent = lb; const st = pct, t0 = performance.now();
    const f = now => {
      const p = Math.min((now - t0) / ms, 1); pct = st + (tg - st) * p;
      ring.style.strokeDashoffset = C * (1 - pct / 100);
      if (p < 1) requestAnimationFrame(f); else res();
    };
    requestAnimationFrame(f);
  });
  await animTo(40, 'Memproses foto...'); await sleep(200);
  await animTo(80, 'Menyiapkan file...');
  const outCanvas = composeFinal();
  const ts = new Date().toISOString().slice(0, 19).replace(/[-:T]/g, '');
  outCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `wisuda-akbar-2026-${ts}.jpg`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/jpeg', 0.95);
  await animTo(100, '✅ Tersimpan!', 250); await sleep(700);
  prog.classList.remove('on'); pct = 0;
  beepShutter();
  toast('✅ Foto berhasil disimpan!');
  setTimeout(() => openShare(), 600);
}

function composeFinal() {
  const d = getCanvasDims();
  const pa = getPhotoArea();
  const c = document.createElement('canvas');
  c.width = d.w; c.height = d.h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#060e20';
  ctx.fillRect(0, 0, d.w, d.h);
  if (photoImg) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(pa.x, pa.y, pa.w, pa.h);
    ctx.clip();
    ctx.translate(pa.x + pa.w / 2 + panX, pa.y + pa.h / 2 + panY);
    ctx.scale(zoom, zoom);
    ctx.drawImage(photoImg, -photoImg.width / 2, -photoImg.height / 2);
    ctx.restore();
  }
  if (frameImg) ctx.drawImage(frameImg, 0, 0, d.w, d.h);
  return c;
}

// ══════════════════════════════════
//  SHARE MODAL
// ══════════════════════════════════
function openShare() { $('share-bg').classList.add('on'); $('share-modal').classList.add('on'); }
function closeShare() { $('share-bg').classList.remove('on'); $('share-modal').classList.remove('on'); }
async function copyCaption() {
  try {
    await navigator.clipboard.writeText(CAPTION);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = CAPTION; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
  toast('✅ Caption tersalin!');
}

// ══════════════════════════════════
//  RESIZE
// ══════════════════════════════════
function onResize() { if (hasPhoto) updateDimPanels(); }
window.addEventListener('resize', onResize);
window.visualViewport?.addEventListener('resize', onResize);

// ══════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if ($('sheet').classList.contains('on')) closeSheet();
    if ($('share-modal').classList.contains('on')) closeShare();
  }
});

// ══════════════════════════════════
//  INIT
// ══════════════════════════════════
async function init() {
  splashP(10, 'Memulai...');
  await sleep(200);
  await loadFrames();
  splashP(95, 'Siap!');
  autoSelectFirstFrame();
  buildSheet();
  if (selFrame) frameImg = await loadImg(`${FB}${selFrame.file}`);
  resizeCanvas();
  await sleep(300);
  splashP(100, 'Selamat datang!');
  await sleep(400);
  splashHide();
}
init();
</script>
